<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AWS Polly Text to Speech</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.container{
    background:white;
    padding:35px;
    border-radius:12px;
    width:420px;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
    text-align:center;
}
h2{
    margin-bottom:20px;
    color:#333;
}
.subtitle{
    font-size:14px;
    color:#777;
    margin-bottom:20px;
}
textarea{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ddd;
    resize:none;
    font-size:14px;
    margin-bottom:15px;
    transition:0.3s;
}
textarea:focus{
    border-color:#667eea;
    outline:none;
}
select{
    width:100%;
    padding:10px 40px 10px 10px;
    border-radius:8px;
    border:1px solid #ddd;
    margin-bottom:15px;
    font-size:14px;
    appearance:none;
    -webkit-appearance:none;
    -moz-appearance:none;
    background:white url("data:image/svg+xml;utf8,<svg fill='%23667eea' height='20' viewBox='0 0 24 24' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>") no-repeat right 10px center;
    background-size:18px;
    cursor:pointer;
}
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 15px rgba(0,0,0,0.2);
}
.audio-box{
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    background:#f7f9fc;
    border:1px solid #e3e6ee;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
    text-align:center;
}
.audio-box p{
    font-size:13px;
    color:#666;
    margin-bottom:8px;
}
audio{
    width:100%;
    outline:none;
    border-radius:8px;
}
.footer{
    margin-top:15px;
    font-size:12px;
    color:#888;
}
</style>
</head>
<body>
<div class="container">
<h2>AWS Polly Text-to-Speech</h2>
<textarea id="text" rows="5"></textarea>
<select id="voice">
<option value="Joanna">Joanna (Female)</option>
<option value="Matthew">Matthew (Male)</option>
<option value="Ivy">Ivy (Female)</option>
</select>
<button onclick="generate()">Generate Speech</button>
<div class="audio-box">
<audio id="audio" controls></audio>
</div>
<div class="footer">
Powered by AWS Polly
</div>
</div>
<script src="back.js"></script>
</body>
</html>
